name: Enterprise FTP Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build and Sync to Hostinger
    runs-on: ubuntu-latest
    
    steps:
      - name: Get Latest Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies & Build Application
        run: |
          npm ci
          npm run build --if-present

     # ... Previous steps stay exactly the same ...

      - name: Sync Production Build to Hostinger File Tree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          # FIX 1: Only deploy the standalone production bundle generated by Next.js
          local-dir: .next/standalone/
          # FIX 2: Explicitly target the public folder for zylxytech.com
          server-dir: domains/zylxytech.com/public_html/