name: Enterprise FTP Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build and Sync to Hostinger
    runs-on: ubuntu-latest
    
    steps:
      - name: Get Latest Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies & Build Application
        run: |
          npm ci
          npm run build
          # Next.js standalone output doesn't copy public and static files, we must copy them manually
          mkdir -p .next/standalone/public
          cp -r public/. .next/standalone/public/ || true
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/. .next/standalone/.next/static/



      - name: Sync Production Build to Hostinger File Tree (via FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: .next/standalone/
          server-dir: public_html/